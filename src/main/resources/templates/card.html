<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/mainPage.css">
    <link rel="stylesheet" href="/css/ShowCard.css">
    <link th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}" rel="stylesheet">

    <title>Pokemon Card</title>
</head>
<body>

<header th:replace="~{fragments/header :: header}"></header>

<nav th:replace="~{fragments/nav :: nav}"></nav>


<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4 mx-auto">
            <div class="card shadow">
                <div class="card-body">
                    <h2 class="card-title text-center mb-4" th:text="${card.name}">Card Name</h2>
                    <p class="card-text"><strong>Game:</strong> <span th:text="${card.game}">Game</span></p>
                    <p class="card-text"><strong>Description:</strong> <span th:text="${card.description}">Description</span></p>
                    <p class="card-text"><strong>Author:</strong> <span th:text="${card.author}">Author</span></p>
                    <p class="card-text"><strong>Price:</strong> $<span th:text="${card.price}">Price</span></p>
                    <p class="card-text"><strong>Condition:</strong> <span th:text="${card.cardCondition}">Condition</span></p>

                    <img th:src="@{/card/image/{id}(id=${card.id})}"  class="img-fluid mx-auto d-block" style="max-height: 500px;" th:alt="${card.name}">

                    <div class="d-flex justify-content-between">
                        <!--TODO mettere questi tasti utilizzabili solo dal possesore delle carte-->
                        <a id="update" sec:authorize="isAuthenticated()" th:href="@{'/card/' + ${card.id} + '/edit'}" class="btn btn-warning">Update</a>
                        <a id="delete" sec:authorize="isAuthenticated()" th:href="@{'/card/' + ${card.id} + '/delete'}" class="btn btn-danger">Delete</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<header th:replace="~{fragments/footer :: footer}"></header>
<script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
