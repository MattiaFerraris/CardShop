<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Edit Card</title>
  <link rel="stylesheet" th:href="@{/css/mainPage.css}">

  <link rel="stylesheet" th:href="@{/css/editCard.css}">
  <link th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}" rel="stylesheet">
</head>
<body>

<header th:replace="~{fragments/header :: header}"></header>

<nav th:replace="~{fragments/nav :: nav}"></nav>

<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow">
        <div class="card-body">
          <h2 class="mb-4 text-center">Edit Card</h2>
          <form th:action="@{/card/{id}/edit(id=${card.id})}" th:object="${card}" method="post" enctype="multipart/form-data">

            <div class="mb-3">
              <label for="name" class="form-label">Name</label>
              <input type="text" id="name" name="name" class="form-control" th:value="${card.name}" required>
            </div>

            <div class="mb-3">
              <label for="game" class="form-label">Game</label>
              <select id="game" name="game" class="form-select" th:field="*{game}" required>
                <option value="POKEMON">Pokèmon</option>
                <option value="MAGIC">Magic: The Gathering</option>
              </select>
            </div>

            <div class="mb-3">
              <label for="description" class="form-label">Description</label>
              <textarea id="description" name="description" class="form-control" th:text="${card.description}" required></textarea>
            </div>

            <div class="mb-3">
              <label for="date" class="form-label">Date</label>
              <input type="date" id="date" name="date" class="form-control" th:field="*{date}" required>
            </div>

            <div class="mb-3">
              <label for="author" class="form-label">Author</label>
              <input type="text" id="author" name="author" class="form-control" th:field="*{author}" required>
            </div>

            <div class="mb-3">
              <label for="cardCondition" class="form-label">Condition</label>
              <select id="cardCondition" name="cardCondition" class="form-select" th:field="*{cardCondition}" required>
                <option value="MINT">Mint</option>
                <option value="NEAR_MINT">Near Mint</option>
                <option value="EXCELLENT">Excellent</option>
                <option value="GOOD">Good</option>
                <option value="LIGHT_PLAYED">Light Played</option>
                <option value="PLAYED">Played</option>
                <option value="POOR">Poor</option>
              </select>
            </div>

            <div class="mb-3">
              <label for="image" class="form-label">Image</label>
              <input type="file" id="image" name="image" class="form-control">
            </div>

            <div class="mb-3">
              <label for="price" class="form-label">Price</label>
              <input type="number" id="price" class="form-control" step="0.01" th:field="*{price}" required>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-primary">Submit</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<header th:replace="~{fragments/footer :: footer}"></header>
<script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
