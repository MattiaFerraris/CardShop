<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Insert New Card</title>
    <link rel="stylesheet" th:href="@{/css/mainPage.css}">
    <link rel="stylesheet" th:href="@{/css/cardSaleForm.css}">
    <link th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}" rel="stylesheet">
</head>
<body>

<header th:replace="~{fragments/header :: header}"></header>

<nav th:replace="~{fragments/nav :: nav}"></nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-body">
                    <h2 class="mb-4 text-center">Insert New Card</h2>
                    <form action="/card/new" method="post" enctype="multipart/form-data">

                        <div class="mb-3">
                            <label for="name" class="form-label">Card Name</label>
                            <input type="text" id="name" name="name" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label for="game" class="form-label">Game</label>
                            <select id="game" name="game" class="form-select" required>
                                <option value="POKEMON">Pokèmon</option>
                                <option value="MAGIC">Magic: The Gathering</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="description" class="form-label">Description</label>
                            <input type="text" id="description" name="description" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label for="date" class="form-label">Date of Insertion</label>
                            <input type="date" id="date" name="date" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label for="author" class="form-label">Author</label>
                            <input type="text" id="author" name="author" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label for="cardCondition" class="form-label">Condition</label>
                            <select id="cardCondition" name="cardCondition" class="form-select" required>
                                <option value="MINT">Mint</option>
                                <option value="NEAR_MINT">Near Mint</option>
                                <option value="EXCELLENT">Excellent</option>
                                <option value="GOOD">Good</option>
                                <option value="LIGHT_PLAYED">Light Played</option>
                                <option value="PLAYED">Played</option>
                                <option value="POOR">Poor</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="price" class="form-label">Price</label>
                            <input type="number" id="price" name="price" class="form-control" step="0.01" required>
                        </div>

                        <div class="mb-3">
                            <label for="image" class="form-label">Image</label>
                            <input type="file" id="image" name="imageFile" class="form-control">
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Submit</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<header th:replace="~{fragments/footer :: footer}"></header>
<script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>

</body>
</html>
