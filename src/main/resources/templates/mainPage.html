<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CARD STORE</title>
    <link rel="stylesheet" th:href="@{/css/mainPage.css}">
    <link th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}" rel="stylesheet">
</head>
<body>


<header th:replace="~{fragments/header :: header}"></header>
<nav th:replace="~{fragments/nav :: nav}"></nav>


<div class="container-fluid py-4">
    <div class="row gx-4 align-items-start">
        <!-- Main Content -->
        <div class="col-12 col-lg-9">
            <section class="mb-5">
                <h2 class="mb-3">WELCOME TO CARD STORE</h2>
                <p>Here you can find the best Pokémon and Magic the Gathering cards for sale!</p>
            </section>

            <!-- Pokémon Cards -->
            <section class="mb-5">
                <h3 class="mb-4">Pokémon Cards</h3>
                <div class="row row-cols-1 row-cols-sm-2 row-cols-md-5 g-4">
                    <div class="col" th:each="card : ${cards}" th:if="${card.game.toString() == 'POKEMON'}">
                        <div class="card h-100">
                            <img th:src="@{/card/image/{id}(id=${card.id})}" class="card-img-top img-fluid" alt="Card image">
                            <div class="card-body">
                                <h5 class="card-title" th:text="${card.name}">Card Name</h5>
                                <p class="card-text">Price: <span th:text="${card.price}">0.00</span> $</p>
                                <p class="card-text">Condition: <span th:text="${card.cardCondition}"></span> </p>
                                <a th:href="@{/card/{id}(id=${card.id})}" class="btn btn-primary">Details</a>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Magic Cards -->
            <section class="mb-5">
                <h3 class="mb-4">Magic Cards</h3>
                <div class="row row-cols-1 row-cols-sm-2 row-cols-md-5 g-4">
                    <div class="col" th:each="card : ${cards}" th:if="${card.game.toString() == 'MAGIC'}">
                        <div class="card h-100">
                            <img th:src="@{/card/image/{id}(id=${card.id})}" class="card-img-top img-fluid" alt="Card image">
                            <div class="card-body">
                                <h5 class="card-title" th:text="${card.name}">Card Name</h5>
                                <p class="card-text">Price: <span th:text="${card.price}">0.00</span> $</p>
                                <a th:href="@{/card/{id}(id=${card.id})}" class="btn btn-primary">Details</a>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <!-- Sidebar -->
        <aside class="col-12 col-lg-3">
            <h4>NEWS</h4>
            <p>Stay updated with the latest news on Pokémon and Magic the Gathering!</p>
        </aside>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
