<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Creation</title>
    <link rel="stylesheet" th:href="@{/css/mainPage.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <link th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}" rel="stylesheet">
</head>
<body>
<header th:replace="~{fragments/header :: header}"></header>
<nav th:replace="~{fragments/nav :: nav}"></nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow">
                <div class="card-body">
                    <h2 class="mb-4 text-center">Create User</h2>
                    <form action="/register" id="userForm" class="needs-validation" method="post">
                        <!-- First Name -->
                        <div class="mb-3">
                            <label for="firstname" class="form-label">First Name</label>
                            <input type="text" id="firstname" name="firstname" class="form-control" required>
                            <div id="firstnameError" class="invalid-feedback"></div>
                        </div>

                        <!-- Last Name -->
                        <div class="mb-3">
                            <label for="lastname" class="form-label">Last Name</label>
                            <input type="text" id="lastname" name="lastname" class="form-control" required>
                            <div id="lastnameError" class="invalid-feedback"></div>
                        </div>

                        <!-- Username -->
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" id="username" name="username" class="form-control" required>
                            <div id="usernameError" class="invalid-feedback"></div>
                        </div>

                        <!-- Password -->
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" id="password" name="password" class="form-control" required>
                            <div id="passwordError" class="invalid-feedback"></div>
                        </div>

                        <!-- Confirm Password -->
                        <div class="mb-3">
                            <label for="passwordtwo" class="form-label">Confirm Password</label>
                            <input type="password" id="passwordtwo" name="passwordtwo" class="form-control" required>
                            <div id="passwordtwoError" class="invalid-feedback"></div>
                        </div>

                        <!-- Submit Button -->
                        <div class="d-grid">
                            <button type="submit" id="submit" class="btn btn-primary" disabled>Create User</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<header th:replace="~{fragments/footer :: footer}"></header>

<script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/checkLogin.js}" defer></script>
</body>
</html>
