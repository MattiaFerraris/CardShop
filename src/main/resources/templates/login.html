<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Creation</title>
    <link rel="stylesheet" href="/css/mainPage.css">
    <link rel="stylesheet" href="/css/login.css">
    <link th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}" rel="stylesheet">
</head>
<body>
<header th:replace="fragments/header :: header"></header>
<nav th:replace="fragments/nav :: nav"></nav>

<div class="form-body">
    <div class="row">
        <div class="form-holder">
            <div class="form-content">
                <div class="form-items">
                    <h2>Create User</h2>
                    <form action="/register" id="userForm" class="requires-validation" method="post">
                        <!-- First Name -->
                        <div class="col-md-12">
                            <input type="text" id="firstname" name="firstname" placeholder="First Name" required>
                            <span id="firstnameIndicator" class="indicator"></span>
                        </div>
                        <div id="firstnameError" class="error"></div>

                        <!-- Last Name -->
                        <div class="col-md-12">
                            <input type="text" id="lastname" name="lastname" placeholder="Last Name" required>
                            <span id="lastnameIndicator" class="indicator"></span>
                        </div>
                        <div id="lastnameError" class="error"></div>

                        <!-- Username -->
                        <div class="col-md-12">
                            <input type="text" id="username" name="username" placeholder="Username" required>
                            <span id="usernameIndicator" class="indicator"></span>
                        </div>
                        <div id="usernameError" class="error"></div>

                        <!-- Password -->
                        <div class="col-md-12">
                            <input type="password" id="password" name="password" placeholder="Password" required>
                            <span id="passwordIndicator" class="indicator"></span>
                        </div>
                        <div id="passwordError" class="error"></div>

                        <!-- Confirm Password -->
                        <div class="col-md-12">
                            <input type="password" id="passwordtwo" name="passwordtwo" placeholder="Confirm Password" required>
                            <span id="passwordtwoIndicator" class="indicator"></span>
                        </div>
                        <div id="passwordtwoError" class="error"></div>

                        <!-- Submit Button -->
                        <div class="col-md-12 mt-3">
                            <button type="submit" id="submit" class="btn btn-primary" disabled>Create User</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer th:replace="fragments/footer :: footer"></footer>

<script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
<script src="/js/checkLogin.js" defer></script>
</body>
</html>
